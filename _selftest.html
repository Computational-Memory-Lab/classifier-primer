<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>self-test</title></head>
<body>
<!--
  Not part of the site. Open /_selftest.html (or load it headlessly) to check the
  in-browser classifier still reproduces the committed MATLAB AUCs for
  participant 45. Prints a report to the page and to the console.

  Expected: each task's MATLAB value falls inside the JS spread across fold seeds.
-->
<pre id="out" style="font:13px ui-monospace,Menlo,monospace;padding:1rem;line-height:1.6"></pre>
<script type="module">
import { loadJSON, loadBin, mean, sd, auc, roc } from './assets/site.js';
import { crossValidate, trainLDA, smote, stratifiedFolds } from './assets/lda.js';
import { rng } from './assets/site.js';

const out = document.getElementById('out');
const log = (s) => { out.textContent += s + '\n'; console.log(s); };
let fails = 0;
const check = (name, cond, detail) => {
  log(`${cond ? '  PASS' : '  FAIL'}  ${name}${detail ? '  — ' + detail : ''}`);
  if (!cond) fails++;
};

/* ---- unit checks on the primitives ---- */
log('AUC primitive');
check('perfect separation = 1.0', auc([0, 0, 1, 1], [1, 2, 3, 4]) === 1);
check('reversed = 0.0', auc([1, 1, 0, 0], [1, 2, 3, 4]) === 0);
check('all-tied = 0.5', auc([0, 1, 0, 1], [7, 7, 7, 7]) === 0.5,
  'a constant prediction must score exactly chance');
check('single swap', Math.abs(auc([0, 1, 0, 1], [1, 2, 3, 4]) - 0.75) < 1e-12);

log('\nROC');
{
  const pts = roc([0, 0, 1, 1], [1, 2, 3, 4]);
  check('starts at origin', pts[0][0] === 0 && pts[0][1] === 0);
  check('ends at (1,1)', pts[pts.length - 1][0] === 1 && pts[pts.length - 1][1] === 1);
}

log('\nStratified folds');
{
  const y = [...Array(30).fill(1), ...Array(70).fill(0)];
  const f = stratifiedFolds(y, 10, rng(1));
  const perFold = Array.from({ length: 10 }, (_, k) =>
    y.filter((v, i) => f[i] === k && v === 1).length);
  check('minority evenly spread', perFold.every((n) => n === 3), `per fold: ${perFold.join(',')}`);
}

log('\nSMOTE');
{
  const X = [...Array(10)].map((_, i) => Float64Array.from([i, i]))
    .concat([...Array(40)].map((_, i) => Float64Array.from([100 + i, 0])));
  const y = [...Array(10).fill(1), ...Array(40).fill(0)];
  const r = smote(X, y, rng(2));
  const n1 = r.y.filter((v) => v === 1).length;
  const n0 = r.y.filter((v) => v === 0).length;
  check('classes balanced', n1 === n0, `${n1} vs ${n0}`);
  check('majority untouched', n0 === 40);
  const synth = r.X.slice(50);
  check('synthetic points lie inside the minority range',
    synth.every((p) => p[0] >= 0 && p[0] <= 9), 'no extrapolation beyond real points');
}

log('\nLDA separates a trivially separable problem');
{
  const r = rng(3);
  const X = [], y = [];
  for (let i = 0; i < 60; i++) { X.push(Float64Array.from([r() + 2, r()])); y.push(1); }
  for (let i = 0; i < 60; i++) { X.push(Float64Array.from([r() - 2, r()])); y.push(0); }
  const score = trainLDA(X, y, 0.5);
  const a = auc(y, X.map(score));
  check('AUC = 1.0 on separable data', a === 1, `got ${a.toFixed(3)}`);
}

/* ---- the real check: participant 45 against MATLAB ---- */
const F = await loadJSON('data/features_45.json');
const buf = await loadBin('data/features_45.bin');
const raw = new Int16Array(buf);
const [N, P] = F.shape;
const codes = F.labels;

function buildSet(task) {
  const rows = [], y = [];
  for (let i = 0; i < N; i++) {
    const c = codes[i];
    let lab = null;
    if (task === 'OldNew') lab = (c === 1 || c === 2) ? 1 : 0;
    else if (task === 'HitMiss') lab = c === 1 ? 1 : c === 2 ? 0 : null;
    else lab = c === 4 ? 1 : c === 3 ? 0 : null;
    if (lab === null) continue;
    const row = new Float64Array(P);
    for (let k = 0; k < P; k++) row[k] = raw[i * P + k] * F.scale;
    rows.push(row); y.push(lab);
  }
  return { X: rows, y };
}

log(`\nParticipant ${F.participant}: JS vs committed MATLAB (${N} trials × ${P} features)`);
const MATLAB = { OldNew: 0.542, HitMiss: 0.572, FAvsCR: 0.566 };
const REPS = 12;
for (const task of ['OldNew', 'HitMiss', 'FAvsCR']) {
  const { X, y } = buildSet(task);
  const runs = [];
  for (let s = 0; s < REPS; s++) {
    const r = crossValidate(X, y, { gamma: 0.5, smote: true, folds: task === 'FAvsCR' ? 5 : 10 }, 500 + s);
    runs.push(mean(r.foldAucs));
  }
  const m = mean(runs), lo = Math.min(...runs), hi = Math.max(...runs);
  const ref = MATLAB[task];
  log(`  ${task.padEnd(8)} js mean=${m.toFixed(3)} sd=${sd(runs).toFixed(3)} range=[${lo.toFixed(3)},${hi.toFixed(3)}]  matlab=${ref}`);
  check(`${task}: MATLAB value inside the JS spread`, ref >= lo - 0.005 && ref <= hi + 0.005);
  check(`${task}: above chance`, m > 0.5);
}

log('\nCheat mode inflates the AUC (overfitting is real)');
{
  const { X, y } = buildSet('OldNew');
  const honest = mean(crossValidate(X, y, { gamma: 0.5, smote: true }, 7).foldAucs);
  const cheat = mean(crossValidate(X, y, { gamma: 0.5, smote: true, cheat: true }, 7).foldAucs);
  log(`  honest=${honest.toFixed(3)}  scored-on-training=${cheat.toFixed(3)}`);
  check('training score is much higher', cheat > honest + 0.15,
    'this is the whole point of the demo');
}

log(`\n${fails === 0 ? 'ALL CHECKS PASSED' : fails + ' CHECK(S) FAILED'}`);
document.title = fails === 0 ? 'selftest: PASS' : `selftest: ${fails} FAIL`;
</script>
</body>
</html>
